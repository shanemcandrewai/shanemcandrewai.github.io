<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>wl</title>
    <link href="main.css" rel="stylesheet" />
    <script type="module" src="js/controller.js"></script>
  </head>

  <body>
    <div class="ui">
      <div class="row">
        <label id="selectFile" for="uploadInput">Select file</label>
        <input id="uploadInput" type="file" />
        <button id="load" type="button" disabled="true">load</button>
        <button id="save" type="button" disabled="true">save</button>
      </div>
      <div class="row">
        <button id="insert" type="button" disabled="true">insert</button>
        <button id="update" type="button" disabled="true">update</button>
        <button id="delete" type="button" disabled="true">delete</button>
        <button id="filter" type="button" disabled="true">filter</button>
      </div>
      <div class="row">
        <button id="next" type="button" disabled="true">next</button>
        <button id="previous" type="button" disabled="true">previous</button>
        <button id="up" type="button" disabled="true">up</button>
        <button id="down" type="button" disabled="true">down</button>
      </div>
      <div class="record">
        <label class="elem" for="id">ID</label>
        <input class="elem" id="id" type="number" max="99999" />
        <label class="elem" for="parent">Parent ID</label>
        <input class="elem" id="parent" type="number" max="99999" />
        <label class="elem" for="created">Created</label>
        <input class="elem" id="created" type="datetime-local" />
        <label class="elem" for="priority">Priority</label>
        <input class="elem" id="priority" type="number" max="5" />
        <label class="elem" for="description">Description</label>
        <input class="elem" id="description" type="text" maxlength="200" />
        <label class="elem" for="due">Due</label>
        <input class="elem" id="due" type="datetime-local" />
      </div>
      <div id="messages" />
    </div>
  </body>
</html>
