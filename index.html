<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>wl</title>
    <link href="css/main.css" rel="stylesheet">
    <script type="module" src="js/initmainview.js"></script>
  </head>

  <body>
    <div id="mocha"></div>
    <div class="container row-gap-1">
      <div class="row">
        <div class="col">
          <input
            class="form-control form-control-sm"
            id="uploadinput"
            type="file"
          >
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="codetokenInput"
            >Authorization</label
          >
        </div>
        <div class="col">
          <input
            class="form-control form-control-sm"
            id="codetokenInput"
            type="password"
          >
        </div>
        <div class="col">
          <button
            id="load"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            load
          </button>
        </div>
        <div class="col">
          <button
            id="save"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            save
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <button id="new" type="button" class="btn btn-outline-primary btn-sm">
            new
          </button>
        </div>
        <div class="col">
          <button
            id="insert"
            type="button"
            class="btn btn-outline-primary btn-sm"
            disabled
          >
            insert
          </button>
        </div>
        <div class="col">
          <button
            id="update"
            type="button"
            class="btn btn-outline-primary btn-sm"
            disabled
          >
            update
          </button>
        </div>
        <div class="col">
          <button
            id="delete"
            type="button"
            class="btn btn-outline-primary btn-sm"
            disabled
          >
            delete
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <button
            id="next"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            next
          </button>
        </div>
        <div class="col">
          <button
            id="previous"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            previous
          </button>
        </div>
        <div class="col">
          <button
            id="up"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            up
          </button>
        </div>
        <div class="col">
          <button
            id="down"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            down
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <button
            id="archive"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            archive
          </button>
        </div>
        <div class="col">
          <button
            id="last"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            last
          </button>
        </div>
        <div class="col">
          <button
            id="sort"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            sort
          </button>
        </div>
        <div class="col">
          <button
            id="downlast"
            type="button"
            disabled
            class="btn btn-outline-primary btn-sm"
          >
            dlast
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="id">ID</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="id" type="number" max="99999">
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="parent">Parent ID</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="parent" type="number" max="9999">
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="created">Created</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="created" type="datetime-local">
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="priority">Priority</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="priority" type="number" max="5">
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="description">Description</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="description" type="text" maxlength="200">
        </div>
      </div>
      <div class="row">
        <div class="col-3">
          <label class="col-form-label form-control-sm" for="due">Due</label>
        </div>
        <div class="col">
          <input class="form-control form-control-sm" id="due" type="datetime-local">
        </div>
      </div>
      <div id="messages"></div>
    </div>
  </body>
</html>
