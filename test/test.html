<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>wl</title>
    <link href="../main.css" rel="stylesheet">
    <script type="module" src="test.all.js"></script>
  </head>

  <body>
    <div class="ui">
      <div class="row">
        <label id="selectFile" for="uploadInput">Select file</label>
        <input id="uploadInput" type="file">
        <label id="codetoken" for="codetokenInput">CodeToken</label>
        <input id="codetokenInput" type="password">
        <button id="load" type="button" disabled>load</button>
        <button id="save" type="button" disabled>save</button>
      </div>
      <div class="row">
        <button id="new" type="button">new</button>
        <button id="insert" type="button" disabled>insert</button>
        <button id="update" type="button" disabled>update</button>
        <button id="delete" type="button" disabled>delete</button>
      </div>
      <div class="row">
        <button id="next" type="button" disabled>next</button>
        <button id="previous" type="button" disabled>previous</button>
        <button id="up" type="button" disabled>up</button>
        <button id="down" type="button" disabled>down</button>
      </div>
      <div class="row">
        <button id="archive" type="button" disabled>archive</button>
        <button id="last" type="button" disabled>last</button>
        <button id="sort" type="button" disabled>sort</button>
        <button id="downlast" type="button" disabled>down last</button>
      </div>
      <div class="record">
        <label class="elem" for="id">ID</label>
        <input class="elem" id="id" type="number" max="99999">
        <label class="elem" for="parent">Parent ID</label>
        <input class="elem" id="parent" type="number" max="9999">
        <label class="elem" for="created">Created</label>
        <input class="elem" id="created" type="datetime-local">
        <label class="elem" for="priority">Priority</label>
        <input class="elem" id="priority" type="number" max="5">
        <label class="elem" for="description">Description</label>
        <input class="elem" id="description" type="text" maxlength="200">
        <label class="elem" for="due">Due</label>
        <input class="elem" id="due" type="datetime-local">
      </div>
      <div id="messages"></div>
	  <div id="mocha"></div>
    </div>
  </body>
</html>
